<!DOCTYPE html>
<html>
<head>
    <title>Flight Finder</title>

    <style>
        body {
            background: #0b0f1a;
            color: white;
            font-family: Arial;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        input, button {
            padding: 12px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }

        button {
            background: #00d4ff;
            cursor: pointer;
        }

        .card {
            background: #1a1f2e;
            padding: 15px;
            margin-top: 10px;
            border-radius: 12px;
            transition: 0.2s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .cheap { border-left: 5px solid #00ff88; }
        .mid { border-left: 5px solid orange; }
        .expensive { border-left: 5px solid red; }

        .topbar {
            display: flex;
            flex-wrap: wrap;
        }

        .quick button {
            background: #1f2638;
        }
    </style>
</head>

<body>

<div class="container">

<h1>✈️ Flight Finder</h1>

<div class="topbar">

    <input id="route" placeholder="TLV-CDG">

    <input type="date" id="date_from">

    <input type="date" id="date_to">

    <input id="price" placeholder="Max price">

    <button onclick="search()">Search</button>

    <a href="/map">
        <button>🌍 Map</button>
    </a>

</div>

<div class="quick">
    <b>🔥 Popular:</b>
    <button onclick="quick('TLV-CDG')">Paris</button>
    <button onclick="quick('TLV-FCO')">Rome</button>
    <button onclick="quick('TLV-LHR')">London</button>
    <button onclick="quick('TLV-JFK')">New York</button>
</div>

<div id="results"></div>

<h3>📅 Cheap Dates</h3>
<div id="calendar"></div>

</div>

<script>

function quick(route) {
    document.getElementById("route").value = route;
    search();
}

function getClass(price) {
    if (price < 200) return "cheap";
    if (price < 400) return "mid";
    return "expensive";
}

async function search() {

    let route = document.getElementById("route").value.toUpperCase();

    let price = document.getElementById("price").value;

    let date_from = document.getElementById("date_from").value;

    let date_to = document.getElementById("date_to").value;

    document.getElementById("results").innerHTML = "⏳ Loading...";

    try {

        const res = await fetch(
            `/api/flights?route=${route}&max_price=${price}&date_from=${date_from}&date_to=${date_to}`
        );

        const data = await res.json();

        let html = "";

        data.flights.forEach(f => {

            html += `
            <div class="card ${getClass(f.price)}">
                <h3>💰 $${f.price}</h3>
                <p>🕐 ${f.dep} → ${f.arr}</p>
            </div>
            `;
        });

        document.getElementById("results").innerHTML = html;

        loadCalendar(route);

    } catch (e) {

        console.log(e);

        document.getElementById("results").innerHTML =
            "❌ Error loading flights";
    }
}

        document.getElementById("results").innerHTML = html;

        loadCalendar(route);

    } catch (e) {
        console.log(e);
        document.getElementById("results").innerHTML = "❌ Error loading flights";
    }
}

async function loadCalendar(route) {

    try {

        const res = await fetch(`/api/calendar?route=${route}`);
        const data = await res.json();

        let html = `
        <table style="
            width:100%;
            border-spacing:10px;
            text-align:center;
        ">
        `;

        let i = 0;

        data.dates.forEach(d => {

            if (i % 5 === 0) {
                html += "<tr>";
            }

            html += `
            <td>
                <div class="card">
                    <h3>${d.date}</h3>
                    <p>💰 $${d.price}</p>
                </div>
            </td>
            `;

            if (i % 5 === 4) {
                html += "</tr>";
            }

            i++;
        });

        html += "</table>";

        document.getElementById("calendar").innerHTML = html;

        } catch (e) {
        console.log(e);
    }
}

</script>

</body>
</html>
