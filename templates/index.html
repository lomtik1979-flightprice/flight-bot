<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Flight Finder</title>

    <style>

        body {

            margin: 0;

            padding: 0;

            background: #072b52;

            color: white;

            font-family: Arial, sans-serif;
        }

        .container {

            width: 95%;

            margin: auto;

            padding-top: 20px;
        }

        .search-bar {

            display: flex;

            align-items: flex-end;

            gap: 15px;

            flex-wrap: wrap;

            margin-bottom: 40px;
        }

        .field {

            display: flex;

            flex-direction: column;
        }

        .field label {

            margin-bottom: 5px;

            font-size: 18px;
        }

        input {

            width: 220px;

            height: 50px;

            border: none;

            border-radius: 12px;

            padding-left: 15px;

            font-size: 18px;
        }

        .search-btn {

            height: 50px;

            padding: 0 35px;

            border: none;

            border-radius: 12px;

            background: #1677ff;

            color: white;

            font-size: 20px;

            cursor: pointer;
        }

        .search-btn:hover {

            background: #005be2;
        }

        #results {

            margin-top: 30px;
        }

        .flight-card {

            background: #12345f;

            border-radius: 22px;

            overflow: hidden;

            margin-bottom: 30px;

            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .flight-card img.city {

            width: 100%;

            height: 240px;

            object-fit: cover;
        }

        .card-content {

            padding: 25px;
        }

        .airline-row {

            display: flex;

            align-items: center;

            gap: 15px;

            margin-bottom: 20px;
        }

        .airline-logo {

            width: 70px;

            height: 70px;

            object-fit: contain;

            background: white;

            border-radius: 12px;

            padding: 5px;
        }

        .price {

            color: #00ff99;

            font-size: 44px;

            font-weight: bold;

            margin-top: 10px;
        }

        .flight-info {

            margin-top: 10px;

            font-size: 18px;
        }

        .direct {

            color: #00ff99;

            font-weight: bold;
        }

        .stops {

            color: orange;

            font-weight: bold;
        }

        .calendar-title {

            margin-top: 50px;

            margin-bottom: 20px;

            font-size: 42px;

            font-weight: bold;
        }

        table {

            width: 100%;

            border-spacing: 15px;
        }

        .calendar-card {

            background: #12345f;

            border-radius: 18px;

            padding: 20px;

            text-align: center;
        }

        .calendar-card h3 {

            margin: 0;
        }

        .calendar-card p {

            color: #00ff99;

            font-size: 24px;

            font-weight: bold;
        }

    </style>

</head>

<body>

<div class="container">

    <!-- SEARCH -->

    <div class="search-bar">

        <div class="field">

            <input
                id="origin"
                placeholder="TLV"
            >

        </div>

        <div class="field">

            <input
                id="destination"
                placeholder="CDG"
            >

        </div>

        <div class="field">

            <label>From</label>

            <input
                id="date_from"
                type="date"
            >

        </div>

        <div class="field">

            <label>To</label>

            <input
                id="date_to"
                type="date"
            >

        </div>

        <div class="field">

            <label>Max Price</label>

            <input
                id="max_price"
                type="number"
                placeholder="1000"
            >

        </div>

        <div class="field">

            <button
                class="search-btn"
                onclick="searchFlights()"
            >
                Search
            </button>

        </div>

    </div>

    <!-- RESULTS -->

    <div id="results"></div>

    <!-- CALENDAR -->

    <div class="calendar-title">

        Cheap Dates

    </div>

    <div id="calendar"></div>

</div>

<script>

async function searchFlights() {

    let origin = document
        .getElementById("origin")
        .value
        .toUpperCase();

    let destination = document
        .getElementById("destination")
        .value
        .toUpperCase();

    let date_from = document
        .getElementById("date_from")
        .value;

    let date_to = document
        .getElementById("date_to")
        .value;

    let max_price = document
        .getElementById("max_price")
        .value;

    let route =
        `${origin}-${destination}`;

    document.getElementById(
        "results"
    ).innerHTML = "<h2>Loading...</h2>";

    try {

        const response = await fetch(

            `/api/flights?route=${route}` +

            `&date_from=${date_from}` +

            `&date_to=${date_to}` +

            `&max_price=${max_price}`
        );

        const data = await response.json();

        let html = "";

        if (
            !data.flights ||
            data.flights.length === 0
        ) {

            html = `
                <h2>
                    No flights found
                </h2>
            `;

        } else {

            data.flights.forEach(f => {

                html += `

                <div class="flight-card">

                    <img
                        class="city"
                        src="${f.city_image}"
                    >

                    <div class="card-content">

                        <div class="airline-row">

                            <img
                                class="airline-logo"
                                src="${f.airline_logo}"
                            >

                            <div>

                                <h2>
                                    ${f.airline}
                                </h2>

                                <p class="${
                                    f.direct
                                    ? "direct"
                                    : "stops"
                                }">

                                    ${
                                        f.direct
                                        ? "Direct Flight"
                                        : "With Stops"
                                    }

                                </p>

                            </div>

                        </div>

                        <div class="price">

                            $${f.price}

                        </div>

                        <div class="flight-info">

                            ${f.dep}
                            →
                            ${f.arr}

                        </div>

                        <div class="flight-info">

                            Duration:
                            ${f.duration} min

                        </div>

                    </div>

                </div>

                `;
            });
        }

        document.getElementById(
            "results"
        ).innerHTML = html;

        loadCalendar(route);

    } catch (e) {

        console.log(e);

        document.getElementById(
            "results"
        ).innerHTML = `
            <h2>Server Error</h2>
        `;
    }
}

async function loadCalendar(route) {

    try {

        const response = await fetch(
            `/api/calendar?route=${route}`
        );

        const data = await response.json();

        let html = `
            <table>
        `;

        let i = 0;

        data.dates.forEach(d => {

            if (i % 4 === 0) {

                html += "<tr>";
            }

            html += `

            <td>

                <div class="calendar-card">

                    <h3>
                        ${d.date}
                    </h3>

                    <p>
                        $${d.price}
                    </p>

                </div>

            </td>

            `;

            if (i % 4 === 3) {

                html += "</tr>";
            }

            i++;
        });

        html += "</table>";

        document.getElementById(
            "calendar"
        ).innerHTML = html;

    } catch (e) {

        console.log(e);
    }
}

</script>

</body>
</html>
