<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Flight Finder</title>

<style>

body {
    background: #03264a;
    color: white;
    font-family: Arial;
    padding: 40px;
}

.search-wrapper {
    max-width: 1200px;
    margin: auto;
}

.search-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}

.field {
    display: flex;
    flex-direction: column;
    position: relative;
}

.field input {
    padding: 15px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    width: 220px;
}

.search-btn {
    background: #0d6efd;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 15px 30px;
    font-size: 20px;
    cursor: pointer;
}

.card {
    background: #14213d;
    border-radius: 16px;
    padding: 20px;
    margin-top: 20px;
}

.autocomplete-box {
    position: absolute;
    top: 70px;
    left: 0;
    width: 220px;
    background: white;
    color: black;
    border-radius: 10px;
    overflow: hidden;
    z-index: 999;
}

.autocomplete-item {
    padding: 12px;
    cursor: pointer;
}

.autocomplete-item:hover {
    background: #f2f2f2;
}

.calendar-card {
    background: #14213d;
    border-radius: 14px;
    padding: 15px;
    text-align: center;
}

table {
    width: 100%;
    border-spacing: 10px;
}

</style>

</head>

<body>

<div class="search-wrapper">

    <div class="search-bar">

        <div class="field">

            <input
                id="origin"
                placeholder="TLV"
                onkeyup="autocomplete(
                    'origin',
                    'origin-list'
                )"
            >

            <div
                id="origin-list"
                class="autocomplete-box">
            </div>

        </div>

        <div class="field">

            <input
                id="destination"
                placeholder="MAD"
                onkeyup="autocomplete(
                    'destination',
                    'dest-list'
                )"
            >

            <div
                id="dest-list"
                class="autocomplete-box">
            </div>

        </div>

        <div class="field">

    <label>From</label>

           <input
               id="date_from"
               type="date"
               lang="en"
            >

            </div>

             <div class="field">

    <label>To</label>

              <input
                  id="date_to"
                  type="date"
                  lang="en"
            >

          </div>

            <div class="field">

    <label>Max Price</label>

             <input
                 id="max_price"
                 type="number"
                 placeholder="500"
            >

           </div>

    <div id="results"></div>

    <h2>
        Cheap Dates
    </h2>

    <div id="calendar"></div>

</div>

<script src="/static/airports.js"></script>

<script>

function autocomplete(inputId, listId) {

    let value =
        document.getElementById(inputId)
        .value
        .toUpperCase();

    let box =
        document.getElementById(listId);

    box.innerHTML = "";

    if (value.length < 1) {
        return;
    }

    airports.forEach(a => {

        if (
            a.code.includes(value) ||
            a.city.toUpperCase().includes(value)
        ) {

            box.innerHTML += `

            <div
                class="autocomplete-item"
                onclick="selectAirport(
                    '${inputId}',
                    '${listId}',
                    '${a.code}'
                )">

                ${a.flag}
                ${a.code}
                - ${a.city}

            </div>

            `;
        }
    });
}

function selectAirport(
    inputId,
    listId,
    code
) {

    document.getElementById(inputId)
        .value = code;

    document.getElementById(listId)
        .innerHTML = "";
}

async function search() {

    let origin =
        document.getElementById("origin")
        .value
        .toUpperCase();

    let destination =
        document.getElementById("destination")
        .value
        .toUpperCase();

    let route =
        let max_price =
    document.getElementById(
        "max_price"
    ).value;
        `${origin}-${destination}`;

    const res = await fetch(
        `/api/flights?route=${route}`
    );

    const data = await res.json();

    let html = "";

    let cityImages = {

        "CDG": "paris.jpg",
        "MAD": "madrid.jpg",
        "FCO": "rome.jpg",
        "BCN": "barcelona.jpg",
        "LHR": "london.jpg",
        "ATH": "athens.jpg",
        "JFK": "newyork.jpg"
    };

    let cityImage =
        cityImages[destination]
        || "default.jpg";

    if (
        !data.flights ||
        data.flights.length === 0
    ) {

        html =
            "<p>No flights found</p>";

    } else {

        data.flights.forEach(f => {

            html += `

            <div class="card">

                <img
                    src="/static/cities/${cityImage}"
                    style="
                    width:100%;
                    height:180px;
                    object-fit:cover;
                    border-radius:14px;
                    margin-bottom:15px;
                    "
                >

                <h2>
                    💰 $${f.price}
                </h2>

                <p>
                    📅 ${f.dep}
                </p>

            </div>

            `;
        });
    }

    document.getElementById("results")
        .innerHTML = html;

    loadCalendar(route);
}

async function loadCalendar(route) {

    const res = await fetch(
        `/api/calendar?route=${route}`
    );

    const data = await res.json();

    let html = "<table>";

    let i = 0;

    data.dates.forEach(d => {

        if (i % 5 === 0) {
            html += "<tr>";
        }

        html += `

        <td>

            <div class="calendar-card">

                <h3>${d.date}</h3>

                <p>
                    💰 $${d.price}
                </p>

            </div>

        </td>

        `;

        if (i % 5 === 4) {
            html += "</tr>";
        }

        i++;
    });

    html += "</table>";

    document.getElementById("calendar")
        .innerHTML = html;
}

</script>

</body>
</html>
