<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flight Finder</title>

<style>

body {
    background: #03264a;
    color: white;
    font-family: Arial;
    margin: 0;
    padding: 40px;
}

.search-wrapper {
    max-width: 1300px;
    margin: auto;
}

.search-bar {
    display: flex;
    gap: 20px;
    align-items: center;
}

.search-btn {
    background: #0d6efd;
    color: white;
    border: none;
    border-radius: 18px;
    padding: 20px 35px;
    font-size: 26px;
    cursor: pointer;
}

.search-box {
    display: flex;
    background: white;
    border-radius: 24px;
    overflow: visible;
    flex: 1;
}

.field {
    display: flex;
    flex-direction: column;
    padding: 18px;
    min-width: 220px;
    border-left: 1px solid #ddd;
    position: relative;
}

.field label {
    color: #444;
    margin-bottom: 6px;
    font-size: 14px;
}

.field input {
    border: none;
    outline: none;
    font-size: 20px;
}

.card {
    background: #14213d;
    padding: 20px;
    border-radius: 18px;
    margin-top: 20px;
}

.autocomplete-box {
    position: absolute;
    top: 90px;
    right: 0;
    background: white;
    color: black;
    width: 240px;
    border-radius: 10px;
    overflow: hidden;
    z-index: 999;
}

.autocomplete-item {
    padding: 12px;
    cursor: pointer;
    border-bottom: 1px solid #eee;
}

.autocomplete-item:hover {
    background: #f2f2f2;
}

table {
    width: 100%;
    border-spacing: 12px;
}

.calendar-card {
    background: #14213d;
    padding: 15px;
    border-radius: 14px;
    text-align: center;
}

</style>

</head>

<body>

<div class="search-wrapper">

    <div class="search-bar">

        <button
            class="search-btn"
            onclick="search()">

            Search

        </button>

        <div class="search-box">

            <div class="field">

                <label>Origin</label>

                <input
                    id="origin"
                    placeholder="TLV"
                    onkeyup="autocomplete(
                        'origin',
                        'origin-list'
                    )"
                >

                <div
                    id="origin-list"
                    class="autocomplete-box">
                </div>

            </div>

            <div class="field">

                <label>Destination</label>

                <input
                    id="destination"
                    placeholder="MAD"
                    onkeyup="autocomplete(
                        'destination',
                        'dest-list'
                    )"
                >

                <div
                    id="dest-list"
                    class="autocomplete-box">
                </div>

            </div>

            <div class="field">

                <label>Date From</label>

                <input
                    id="date_from"
                    type="date"
                >

            </div>

            <div class="field">

                <label>Date To</label>

                <input
                    id="date_to"
                    type="date"
                >

            </div>

        </div>

    </div>

    <div id="results"></div>

    <h2 style="margin-top:40px;">
        Cheap Dates
    </h2>

    <div id="calendar"></div>

</div>

<script src="/static/airports.js"></script>

<script>

function autocomplete(inputId, listId) {

    let value =
        document.getElementById(inputId)
        .value
        .toUpperCase();

    let box =
        document.getElementById(listId);

    box.innerHTML = "";

    if (value.length < 1) {
        return;
    }

    airports.forEach(a => {

        if (
            a.code.includes(value) ||
            a.city.toUpperCase().includes(value)
        ) {

            box.innerHTML += `

            <div
                class="autocomplete-item"
                onclick="selectAirport(
                    '${inputId}',
                    '${listId}',
                    '${a.code}'
                )">

                ${a.flag}
                ${a.code}
                - ${a.city}

            </div>

            `;
        }
    });
}

function selectAirport(
    inputId,
    listId,
    code
) {

    document.getElementById(inputId)
        .value = code;

    document.getElementById(listId)
        .innerHTML = "";
}

async function search() {

    let origin =
        document.getElementById("origin")
        .value
        .toUpperCase();

    let destination =
        document.getElementById("destination")
        .value
        .toUpperCase();

    let route =
        `${origin}-${destination}`;

    document.getElementById("results")
        .innerHTML = "Loading...";

    const res = await fetch(
        `/api/flights?route=${route}`
    );

    const data = await res.json();

    let html = "";

    let cityImages = {

        "CDG": "paris.jpg",
        "ORY": "paris.jpg",

        "MAD": "madrid.jpg",

        "FCO": "rome.jpg",

        "BCN": "barcelona.jpg",

        "LHR": "london.jpg",

        "ATH": "athens.jpg",

        "JFK": "newyork.jpg"
    };

    let cityImage =
        cityImages[destination]
        || "default.jpg";

    if (
        !data.flights ||
        data.flights.length === 0
    ) {

        html =
            "<p>No flights found</p>";

    } else {

        data.flights.forEach(f => {

            html += `

            <div class="card">

                <img
                    src="/static/cities/${cityImage}"
                    style="
                    width:100%;
                    height:180px;
                    object-fit:cover;
                    border-radius:14px;
                    margin-bottom:15px;
                    "
                >

                <h2>
                    💰 $${f.price}
                </h2>

                <p>
                    📅 ${f.dep}
                </p>

            </div>

            `;
        });
    }

    document.getElementById("results")
        .innerHTML = html;

    loadCalendar(route);
}

async function loadCalendar(route) {

    const res = await fetch(
        `/api/calendar?route=${route}`
    );

    const data = await res.json();

    let html = "<table>";

    let i = 0;

    data.dates.forEach(d => {

        if (i % 5 === 0) {
            html += "<tr>";
        }

        html += `

        <td>

            <div class="calendar-card">

                <h3>${d.date}</h3>

                <p>
                    💰 $${d.price}
                </p>

            </div>

        </td>

        `;

        if (i % 5 === 4) {
            html += "</tr>";
        }

        i++;
    });

    html += "</table>";

    document.getElementById("calendar")
        .innerHTML = html;
}

</script>

</body>
</html>
