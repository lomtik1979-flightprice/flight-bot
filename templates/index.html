<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Flight Finder</title>

    <style>

        body {

            margin: 0;

            padding: 0;

            background: #072b52;

            color: white;

            font-family: Arial;
        }

        .container {

            width: 95%;

            margin: auto;

            padding-top: 30px;
        }

        .search-bar {

            display: flex;

            align-items: flex-end;

            gap: 15px;

            flex-wrap: wrap;
        }

        .field {

            display: flex;

            flex-direction: column;
        }

        .field label {

            margin-bottom: 5px;

            font-size: 18px;
        }

        input {

            width: 220px;

            height: 50px;

            border: none;

            border-radius: 12px;

            padding-left: 15px;

            font-size: 18px;
        }

        .search-btn {

            height: 50px;

            padding: 0 35px;

            border: none;

            border-radius: 12px;

            background: #1677ff;

            color: white;

            font-size: 20px;

            cursor: pointer;
        }

        .search-btn:hover {

            background: #005be2;
        }

        #results {

            margin-top: 40px;
        }

        .card {

            background: #102d50;

            border-radius: 18px;

            overflow: hidden;

            margin-bottom: 25px;
        }

        .card img {

            width: 100%;

            height: 220px;

            object-fit: cover;
        }

        .card-content {

            padding: 20px;
        }

        .price {

            font-size: 32px;

            font-weight: bold;

            color: #00ff99;
        }

        .dates {

            margin-top: 10px;

            font-size: 18px;
        }

        .calendar-title {

            margin-top: 50px;

            font-size: 42px;

            font-weight: bold;
        }

        #calendar {

            margin-top: 25px;
        }

        table {

            width: 100%;

            border-spacing: 15px;
        }

        .calendar-card {

            background: #12345f;

            border-radius: 16px;

            padding: 20px;

            text-align: center;
        }

    </style>

</head>

<body>

<div class="container">

    <!-- SEARCH -->

    <div class="search-bar">

        <div class="field">

            <input
                id="origin"
                placeholder="TLV"
            >

        </div>

        <div class="field">

            <input
                id="destination"
                placeholder="CDG"
            >

        </div>

        <div class="field">

            <label>From</label>

            <input
                id="date_from"
                type="date"
                value="2026-06-01"
            >

        </div>

        <div class="field">

            <label>To</label>

            <input
                id="date_to"
                type="date"
                value="2026-06-22"
            >

        </div>

        <div class="field">

            <label>Max Price</label>

            <input
                id="max_price"
                type="number"
                placeholder="500"
            >

        </div>

        <div class="field">

            <button
                class="search-btn"
                onclick="searchFlights()"
            >
                Search
            </button>

        </div>

    </div>

    <!-- RESULTS -->

    <div id="results"></div>

    <!-- CALENDAR -->

    <div class="calendar-title">

        Cheap Dates

    </div>

    <div id="calendar"></div>

</div>

<script>

async function searchFlights() {

    let origin = document
        .getElementById("origin")
        .value
        .toUpperCase();

    let destination = document
        .getElementById("destination")
        .value
        .toUpperCase();

    let date_from = document
        .getElementById("date_from")
        .value;

    let date_to = document
        .getElementById("date_to")
        .value;

    let max_price = document
        .getElementById("max_price")
        .value;

    let route =
        `${origin}-${destination}`;

    document.getElementById(
        "results"
    ).innerHTML = "Loading...";

    try {

        const res = await fetch(

            `/api/flights?route=${route}` +

            `&date_from=${date_from}` +

            `&date_to=${date_to}` +

            `&max_price=${max_price}`
        );

        const data = await res.json();

        let html = "";

        if (
            !data.flights ||
            data.flights.length === 0
        ) {

            html =
                "<h2>No flights found</h2>";

        } else {

            data.flights.forEach(f => {

                html += `

                <div class="card">

                    <img
                        src="/static/cities/default.jpg"
                    >

                    <div class="card-content">

                        <div class="price">

                            $${f.price}

                        </div>

                        <div class="dates">

                            ${f.dep}
                            →
                            ${f.arr}

                        </div>

                    </div>

                </div>
                `;
            });
        }

        document.getElementById(
            "results"
        ).innerHTML = html;

        loadCalendar(route);

    } catch (e) {

        console.log(e);

        document.getElementById(
            "results"
        ).innerHTML =
            "<h2>Server Error</h2>";
    }
}

async function loadCalendar(route) {

    try {

        const res = await fetch(
            `/api/calendar?route=${route}`
        );

        const data = await res.json();

        let html = `
        <table>
        `;

        let i = 0;

        data.dates.forEach(d => {

            if (i % 4 === 0) {

                html += "<tr>";
            }

            html += `

            <td>

                <div class="calendar-card">

                    <h3>${d.date}</h3>

                    <p>$${d.price}</p>

                </div>

            </td>
            `;

            if (i % 4 === 3) {

                html += "</tr>";
            }

            i++;
        });

        html += "</table>";

        document.getElementById(
            "calendar"
        ).innerHTML = html;

    } catch (e) {

        console.log(e);
    }
}

</script>

</body>
</html>
