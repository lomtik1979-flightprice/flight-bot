<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Finder</title>

    <style>

        body {
            background: #03264a;
            font-family: Arial, sans-serif;
            color: white;
            margin: 0;
            padding: 40px;
        }

        .search-wrapper {
            max-width: 1200px;
            margin: auto;
        }

        .top-controls {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            margin-bottom: 15px;
        }

        .mini-select {
            background: #062d56;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 10px 15px;
            font-size: 15px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-btn {
            background: #0d6efd;
            color: white;
            border: none;
            border-radius: 14px;
            padding: 22px 30px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 18px;
            overflow: hidden;
            flex: 1;
        }

        .field {
            display: flex;
            flex-direction: column;
            padding: 16px 22px;
            border-left: 1px solid #dcdcdc;
            min-width: 150px;
        }

        .field.large {
            min-width: 260px;
        }

        .field label {
            color: #333;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .field input {
            border: none;
            outline: none;
            font-size: 18px;
            color: #222;
            background: transparent;
        }

        .swap-btn {
            width: 54px;
            height: 54px;
            min-width: 54px;
            border-radius: 50%;
            border: 4px solid #03264a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #03264a;
            background: white;
            margin: 0 -27px;
            z-index: 10;
        }

        .options-row {
            display: flex;
            gap: 30px;
            margin-top: 14px;
            padding-right: 10px;
        }

        .options-row label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
        }

        .options-row input {
            width: 18px;
            height: 18px;
        }

        .card {
            background: #14213d;
            padding: 20px;
            border-radius: 16px;
            margin-top: 15px;
            border-left: 5px solid #00d4ff;
        }

        #results {
            margin-top: 30px;
        }

        #calendar {
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-spacing: 10px;
        }

        td {
            vertical-align: top;
        }

        .calendar-card {
            background: #14213d;
            border-radius: 14px;
            padding: 15px;
            text-align: center;
        }

        .cheap {
            border-left: 5px solid #00ff88;
        }

        .mid {
            border-left: 5px solid orange;
        }

        .expensive {
            border-left: 5px solid red;
        }

        @media (max-width: 1100px) {

            .search-box {
                flex-direction: column;
                align-items: stretch;
            }

            .field {
                border-left: none;
                border-bottom: 1px solid #ddd;
            }

            .swap-btn {
                display: none;
            }

            .search-bar {
                flex-direction: column;
            }

            .search-btn {
                width: 100%;
            }

            .options-row {
                flex-direction: column;
                gap: 10px;
            }
        }

    </style>

</head>

<body>

<div class="search-wrapper" dir="rtl">

    <div class="top-controls">

        <select class="mini-select">
            <option>הלוך־חזור</option>
        </select>

        <select class="mini-select">
            <option>תיירים</option>
        </select>

    </div>

    <div class="search-bar">

        <button class="search-btn" onclick="search()">
            חיפוש
        </button>

        <div class="search-box">

            <div class="field large">
                <label>מוצא</label>
                <input id="route" type="text" placeholder="TLV-PAR">
            </div>

            <div class="swap-btn">
                ⇄
            </div>

            <div class="field">
                <label>יציאה</label>
                <input id="date_from" type="date">
            </div>

            <div class="field">
                <label>חזרה</label>
                <input id="date_to" type="date">
            </div>

            <div class="field">
                <label>מחיר מקסימלי</label>
                <input id="price" type="number" placeholder="400">
            </div>

        </div>

    </div>

    <div class="options-row">

        <label>
            <input type="checkbox" checked>
            טיסות ישירות בלבד
        </label>

        <label>
            <input type="checkbox">
            חברות ישראליות בלבד
        </label>

    </div>

    <div id="results"></div>

    <h2 style="margin-top:40px;">
        📅 Cheap Dates
    </h2>

    <div id="calendar"></div>

</div>

<script>

function getClass(price) {

    if (price < 200) return "cheap";

    if (price < 400) return "mid";

    return "expensive";
}

async function search() {

    let route = document.getElementById("route")
        .value
        .toUpperCase()
        .trim();

    let price = document.getElementById("price").value;

    let date_from =
        document.getElementById("date_from").value;

    let date_to =
        document.getElementById("date_to").value;

    document.getElementById("results").innerHTML =
        "⏳ Loading...";

    try {

        const res = await fetch(
            `/api/flights?route=${route}&max_price=${price}&date_from=${date_from}&date_to=${date_to}`
        );

        const data = await res.json();

        let html = "";

        if (data.flights.length === 0) {

            html = "<p>❌ No flights found</p>";

        } else {

            data.flights.forEach(f => {

                html += `
                <div class="card ${getClass(f.price)}">

                    <h3>💰 $${f.price}</h3>

                    <p>
                        📅 ${f.dep}
                    </p>

                </div>
                `;
            });
        }

        document.getElementById("results").innerHTML =
            html;

        loadCalendar(route);

    } catch (e) {

        console.log(e);

        document.getElementById("results").innerHTML =
            "❌ Error";
    }
}

async function loadCalendar(route) {

    try {

        const res = await fetch(
            `/api/calendar?route=${route}`
        );

        const data = await res.json();

        let html = `
        <table>
        `;

        let i = 0;

        data.dates.forEach(d => {

            if (i % 5 === 0) {
                html += "<tr>";
            }

            html += `
            <td>

                <div class="calendar-card">

                    <h3>${d.date}</h3>

                    <p>💰 $${d.price}</p>

                </div>

            </td>
            `;

            if (i % 5 === 4) {
                html += "</tr>";
            }

            i++;
        });

        html += "</table>";

        document.getElementById("calendar").innerHTML =
            html;

    } catch (e) {

        console.log(e);
    }
}

</script>

</body>
</html>
