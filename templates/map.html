<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>body{margin:0;}#map{height:100vh;}</style>
</head>

<body>
<div id="map"></div>

<script>
var map = L.map('map').setView([30, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const cities = [
    { code: "CDG", lat: 48.85, lng: 2.35 },
    { code: "FCO", lat: 41.9, lng: 12.5 },
    { code: "LHR", lat: 51.5, lng: -0.1 },
    { code: "JFK", lat: 40.7, lng: -74 }
];

cities.forEach(city => {
    let marker = L.marker([city.lat, city.lng]).addTo(map);

    marker.on("click", async () => {
        let res = await fetch(`/api/flights?route=TLV-${city.code}`);
        let data = await res.json();

        if (data.flights.length > 0) {
            marker.bindPopup(`💰 $${data.flights[0].price}`).openPopup();
        } else {
            marker.bindPopup("Нет данных").openPopup();
        }
    });
});
</script>

</body>
</html>
